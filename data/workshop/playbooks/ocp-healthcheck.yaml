---
- name: Validate cluster health
  hosts: localhost
  gather_facts: false

  tasks:

    - name: Retrieve cluster version resource
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: ClusterVersion
        name: version
      register: cluster_version_raw

    - name: Fail if cluster version cannot be retrieved
      ansible.builtin.fail:
        msg: "Unable to connect. Check your aap credential attachment."
      when: cluster_version_raw.resources | length == 0

    - name: Report current cluster version
      ansible.builtin.debug:
        msg: "Cluster version: {{ cluster_version_raw.resources[0].status.desired.version }}"

    - name: Retrieve cluster operators
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: ClusterOperator
      register: cluster_operators

    - name: Assert all cluster operators are healthy
      vars:
        unhealthy_ops: >-
          {{ cluster_operators.resources | default([])
             | community.general.json_query('[?status.conditions[?type==`Degraded` && status==`True`]] .metadata.name')
             + cluster_operators.resources | default([])
             | community.general.json_query('[?status.conditions[?type==`Available` && status==`False`]] .metadata.name') }}
      ansible.builtin.assert:
        that:
          - unhealthy_ops | length == 0
        fail_msg: "Degraded operators found: {{ unhealthy_ops | unique }}"
        success_msg: "All cluster operators are healthy."
