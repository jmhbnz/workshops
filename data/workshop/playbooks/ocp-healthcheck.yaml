---
- name: Validate cluster health
  hosts: localhost
  gather_facts: false

  tasks:

    - name: Retrieve cluster version resource
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: ClusterVersion
        name: version
      register: cluster_version_raw

    - name: Fail if cluster version cannot be retrieved
      ansible.builtin.fail:
        msg: "Unable to connect. Check your aap credential attachment."
      when: cluster_version_raw.resources | length == 0

    - name: Report current cluster version
      ansible.builtin.debug:
        msg: "Cluster version: {{ cluster_version_raw.resources[0].status.desired.version }}"

    - name: Retrieve cluster operators
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: ClusterOperator
      register: cluster_operators

    - name: Identify degraded operators
      ansible.builtin.set_fact:
        unhealthy_operators: "{{ unhealthy_operators + [item.0.metadata.name] }}"
      loop: "{{ q('ansible.builtin.subelements', cluster_operators.resources | default([]), 'status.conditions', {'skip_missing': true}) }}"
      when: >
        (item.1.type == 'Degraded' and item.1.status == 'True') or
        (item.1.type == 'Available' and item.1.status == 'False')

    - name: Assert all operators are healthy
      ansible.builtin.assert:
        that:
          - unhealthy_operators | length == 0
        fail_msg: "Degraded operators found: {{ unhealthy_operators | unique }}"
        success_msg: "All cluster operators are healthy."
