---
- name: Validate cluster health
  hosts: localhost
  gather_facts: false

  tasks:

    - name: Retrieve cluster version resource
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: ClusterVersion
        name: version
      register: cluster_version_raw

    - name: Fail if cluster version cannot be retrieved
      ansible.builtin.fail:
        msg: "Unable to connect. Check your aap credential attachment."
      when: cluster_version_raw.resources | length == 0

    - name: Report current cluster version
      ansible.builtin.debug:
        msg: "Cluster version: {{ cluster_version_raw.resources[0].status.desired.version }}"

    - name: Retrieve cluster operators
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: ClusterOperator
      register: cluster_operators

    - name: Identify degraded operators
      ansible.builtin.set_fact:
        unhealthy_operators: >-
          {% set invalid = [] %}
          {% for co in cluster_operators.resources | default([]) %}
            {% set degraded = co.status.conditions | selectattr('type', 'equalto', 'Degraded') | selectattr('status', 'equalto', 'True') | list %}
            {% set unavailable = co.status.conditions | selectattr('type', 'equalto', 'Available') | selectattr('status', 'equalto', 'False') | list %}
            {% if degraded | length > 0 or unavailable | length > 0 %}
              {% if invalid.append(co.metadata.name) %}{% endif %}
            {% endif %}
          {% endfor %}
          {{ invalid }}

    - name: Assert all cluster operators are healthy
      ansible.builtin.assert:
        that:
          - unhealthy_operators | length == 0
        fail_msg: "Degraded operators found: {{ unhealthy_operators }}"
        success_msg: "All cluster operators are healthy."
