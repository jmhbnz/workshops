---
- name: Expand pvc
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Expand target persistent volume claim request size
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: "{{ ansible_eda.event.payload.alerts[0].labels.persistentvolumeclaim }}"
            namespace: "{{ ansible_eda.event.payload.alerts[0].labels.namespace }}"
          spec:
            resources:
              requests:
                storage: 2Gi

    - name: Display storage adjustment summary
      ansible.builtin.debug:
        msg: "Success: persistent volume claim {{ ansible_eda.event.payload.alerts[0].labels.persistentvolumeclaim }} automatically expanded in namespace {{ ansible_eda.event.payload.alerts[0].labels.namespace }} to prevent outage."
