apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: security-workshop-env
  annotations:
    description: "Declarative blueprint for a single forensic workshop environment."

parameters:
  - name: SUFFIX
    description: "The numeric suffix for the namespace"
    required: true

objects:
  - apiVersion: project.openshift.io/v1
    kind: Project
    metadata:
      name: payment-gateway-${SUFFIX}

  - apiVersion: v1
    kind: Pod
    metadata:
      name: payment-gateway
      namespace: payment-gateway-${SUFFIX}
      labels:
        app: payment-gateway
    spec:
      containers:
        - name: httpd
          image: 'image-registry.openshift-image-registry.svc:5000/openshift/httpd:latest'
          ports:
            - containerPort: 8080

  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: cicd-pipeline-runner-sa
      namespace: payment-gateway-${SUFFIX}

  - apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: workshop-sa-edit-binding
      namespace: payment-gateway-${SUFFIX}
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: edit
    subjects:
      - kind: ServiceAccount
        name: cicd-pipeline-runner-sa
        namespace: payment-gateway-${SUFFIX}

  - apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      name: container-executor
      namespace: payment-gateway-${SUFFIX}
    rules:
      - apiGroups: [""]
        resources: ["pods/exec"]
        verbs: ["create", "get"]

  - apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: workshop-sa-exec-binding
      namespace: payment-gateway-${SUFFIX}
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: container-executor
    subjects:
      - kind: ServiceAccount
        name: cicd-pipeline-runner-sa
        namespace: payment-gateway-${SUFFIX}

  - apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: attendee-admin-binding
      namespace: payment-gateway-${SUFFIX}
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: admin
    subjects:
      - kind: User
        apiGroup: rbac.authorization.k8s.io
        name: user${SUFFIX}

  - apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: node-logs-binding-${SUFFIX}
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: node-log-viewer
    subjects:
      - kind: User
        apiGroup: rbac.authorization.k8s.io
        name: user${SUFFIX}

  - apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: must-gather-sa-metadata-binding-${SUFFIX}
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: node-log-viewer
    subjects:
      - kind: ServiceAccount
        name: default
        namespace: payment-gateway-${SUFFIX}

  - apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: attendee-privileged-scc-binding
      namespace: payment-gateway-${SUFFIX}
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: system:openshift:scc:privileged
    subjects:
      - kind: User
        apiGroup: rbac.authorization.k8s.io
        name: user${SUFFIX}
